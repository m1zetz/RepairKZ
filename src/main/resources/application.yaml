server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 50

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 20
      idle-timeout: 30000
      connection-timeout: 20000
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB
  jpa:
    properties:
      hibernate:
        ddl-auto: update
        show_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
      temp:
        use_jdbc_metadata_defaults: false
    hibernate:
      ddl-auto: update

  application:
    name: RepairKZ-Backend
security:
  key: ${JWT_SECRET}
logging:
  level:
    org.springframework.web: INFO
    root: INFO
